<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Online</title>

<style>

/* ESTILO GENERAL */
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
    text-align: center;
    margin: 0;
}

/* HEADER */
header{
    background: #1976D2;
    color: white;
    padding: 20px;
    font-size: 1.5em;
}

/* CONTENEDOR */
.producto{
    background: white;
    margin: 30px auto;
    padding: 20px;
    width: 250px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.producto:hover{
    transform: scale(1.05);
}

/* BOTON */
button{
    background: #1976D2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover{
    background: #0D47A1;
}

</style>
</head>

<body>

<header>
<h1>Tienda Online</h1>
</header>

<div class="producto">
<h2>Gorra</h2>
<p>Precio: RD$2000</p>
<button onclick="comprar()">Comprar</button>
</div>

<script>
function comprar(){
    window.open("https://www.instagram.com/", "_blank");
}
</script>

</body>
</html>{}
